<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>자산 포트폴리오 트래커</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F2F4F6; --surface: #FFFFFF; --surface2: #F8F9FA; --border: #E5E8EB;
    --text1: #191F28; --text2: #4E5968; --text3: #8B95A1;
    --blue: #3182F6; --blue-bg: #EBF3FE; --blue-text: #1B64DA;
    --green: #00B493; --green-bg: #E6F9F5; --green-text: #007A64;
    --red: #F04452; --red-bg: #FFF0F1; --red-text: #C0303C;
    --yellow: #F7A600; --yellow-bg: #FFF9E6;
    --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 20px;
  }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; }
  .header { background: var(--surface); padding: 20px 20px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-title { font-size: 18px; font-weight: 700; }
  .header-subtitle { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .month-tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .month-tabs::-webkit-scrollbar { display: none; }
  .month-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 20px 20px 0 0; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text3); background: transparent; border: none; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .month-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
  .month-tab:hover:not(.active) { color: var(--text2); background: var(--surface2); }
  .content { padding: 16px; max-width: 480px; margin: 0 auto; }
  .total-card { background: linear-gradient(135deg, #3182F6 0%, #1B64DA 100%); border-radius: var(--radius-xl); padding: 24px; color: white; margin-bottom: 12px; position: relative; overflow: hidden; }
  .total-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .total-label { font-size: 13px; opacity: 0.8; margin-bottom: 6px; }
  .total-amount { font-size: 30px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
  .total-change { display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .change-badge { background: rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 20px; font-weight: 600; font-size: 12px; }
  .change-badge.positive { background: rgba(0,255,170,0.2); }
  .change-badge.negative { background: rgba(255,100,100,0.2); }
  .goal-bar-wrap { margin-top: 16px; }
  .goal-bar-label { display: flex; justify-content: space-between; font-size: 12px; opacity: 0.75; margin-bottom: 6px; }
  .goal-bar-bg { background: rgba(255,255,255,0.2); border-radius: 99px; height: 6px; overflow: hidden; }
  .goal-bar-fill { background: white; height: 100%; border-radius: 99px; transition: width 0.5s ease; }
  .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; }
  .stat-card-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .stat-card-value { font-size: 18px; font-weight: 700; }
  .stat-card-sub { font-size: 12px; margin-top: 2px; }
  .stat-card-sub.up { color: var(--green); }
  .stat-card-sub.down { color: var(--red); }
  .stat-card-sub.neutral { color: var(--text3); }
  .section-title { font-size: 15px; font-weight: 700; margin: 20px 0 10px; }
  .asset-list { background: var(--surface); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 12px; }
  .asset-item { padding: 14px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
  .asset-item:last-child { border-bottom: none; }
  .asset-item:hover { background: var(--surface2); }
  .asset-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .asset-info { flex: 1; min-width: 0; }
  .asset-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .asset-account { font-size: 12px; color: var(--text3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .asset-right { text-align: right; flex-shrink: 0; }
  .asset-amount { font-size: 14px; font-weight: 600; }
  .asset-pct { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .asset-bar-wrap { margin-top: 2px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; width: 60px; }
  .asset-bar-fill { height: 100%; border-radius: 99px; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 99px; font-weight: 600; }
  .badge-warning { background: var(--yellow-bg); color: var(--yellow); }
  .badge-ok { background: var(--green-bg); color: var(--green-text); }
  .badge-danger { background: var(--red-bg); color: var(--red-text); }
  .chart-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
  .chart-card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .doughnut-wrap { display: flex; align-items: center; gap: 20px; }
  .doughnut-canvas-wrap { width: 130px; height: 130px; flex-shrink: 0; position: relative; }
  .doughnut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
  .doughnut-center-num { font-size: 18px; font-weight: 700; }
  .doughnut-center-label { font-size: 10px; color: var(--text3); }
  .legend-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-name { flex: 1; color: var(--text2); }
  .legend-pct { font-weight: 600; }
  .trend-wrap { position: relative; height: 160px; }
  .input-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
  .input-card-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
  .input-group { display: flex; flex-direction: column; gap: 4px; }
  .input-label { font-size: 11px; color: var(--text3); font-weight: 500; }
  .input-field { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; font-family: inherit; color: var(--text1); width: 100%; outline: none; transition: border-color 0.15s; text-align: right; }
  .input-field:focus { border-color: var(--blue); }
  .save-btn { width: 100%; background: var(--blue); color: white; border: none; border-radius: var(--radius-md); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; transition: background 0.15s; }
  .save-btn:active { background: var(--blue-text); }
  .save-btn:disabled { background: var(--text3); cursor: not-allowed; }
  .rebalance-card { background: var(--surface); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
  .rebalance-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .rebalance-row:last-child { border-bottom: none; }
  .rebalance-asset { font-size: 13px; font-weight: 600; }
  .rebalance-action { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 99px; }
  .rebalance-buy { background: var(--blue-bg); color: var(--blue-text); }
  .rebalance-sell { background: var(--red-bg); color: var(--red-text); }
  .rebalance-hold { background: var(--green-bg); color: var(--green-text); }
  .sync-banner { background: var(--green-bg); border: 1px solid var(--green); border-radius: var(--radius-md); padding: 10px 14px; font-size: 12px; color: var(--green-text); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sync-banner.error { background: var(--red-bg); border-color: var(--red); color: var(--red-text); }
  .sync-banner.loading { background: var(--blue-bg); border-color: var(--blue); color: var(--blue-text); }
  .sync-banner { display: none; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text1); color: white; padding: 12px 20px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; z-index: 999; transition: transform 0.3s ease; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 8px 0 20px; z-index: 100; }
  .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; font-weight: 500; color: var(--text3); cursor: pointer; background: none; border: none; font-family: inherit; padding: 6px 0; transition: color 0.15s; }
  .tab-btn.active { color: var(--blue); }
  .page { display: none; }
  .page.active { display: block; }
  .pb-nav { padding-bottom: 90px; }
  .sheets-link { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 12px; text-decoration: none; color: var(--text1); border: 1px solid var(--border); font-size: 13px; font-weight: 600; }
  .sheets-link:hover { background: var(--surface2); }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">자산 포트폴리오</div>
      <div class="header-subtitle">달리오 + 박곰희 전략</div>
    </div>
    <div style="font-size:12px;color:var(--text3);" id="currentDate"></div>
  </div>
  <div class="month-tabs" id="monthTabs"></div>
</div>

<div class="content pb-nav">

  <!-- 홈 페이지 -->
  <div class="page active" id="page-home">
    <div class="total-card">
      <div class="total-label">총 자산</div>
      <div class="total-amount" id="totalAmount">₩0</div>
      <div class="total-change">
        <span class="change-badge" id="changeBadge">-</span>
        <span id="changeText" style="opacity:0.8;font-size:12px;">전월 대비</span>
      </div>
      <div class="goal-bar-wrap">
        <div class="goal-bar-label"><span>목표 달성률</span><span id="goalPct">0%</span></div>
        <div class="goal-bar-bg"><div class="goal-bar-fill" id="goalBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-card-label">이번 달 수익</div>
        <div class="stat-card-value" id="monthProfit">₩0</div>
        <div class="stat-card-sub" id="monthProfitPct">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-card-label">누적 수익</div>
        <div class="stat-card-value" id="totalProfit">₩0</div>
        <div class="stat-card-sub" id="totalProfitPct">-</div>
      </div>
    </div>

    <div class="section-title">자산 현황</div>
    <div class="asset-list" id="assetList"></div>

    <div class="chart-card">
      <div class="chart-card-title">자산 배분 현황</div>
      <div class="doughnut-wrap">
        <div class="doughnut-canvas-wrap">
          <canvas id="donutChart"></canvas>
          <div class="doughnut-center">
            <div class="doughnut-center-num" id="donutCenter">-</div>
            <div class="doughnut-center-label">총 자산</div>
          </div>
        </div>
        <div class="legend-list" id="legendList"></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-title">월별 자산 추이</div>
      <div class="trend-wrap"><canvas id="trendChart"></canvas></div>
    </div>

    <div class="section-title">리밸런싱 알림</div>
    <div class="rebalance-card" id="rebalanceList"></div>
  </div>

  <!-- 입력 페이지 -->
  <div class="page" id="page-input">

    <!-- Sheets 연동 상태 배너 -->
    <div class="sync-banner" id="syncBanner"></div>

    <div class="input-card">
      <div class="input-card-title" id="inputMonthTitle">월 자산 입력</div>
      <div class="input-row">
        <div class="input-group">
          <div class="input-label">💰 파킹통장 (비상금)</div>
          <input class="input-field" id="inp-cash" type="number" placeholder="0" min="0">
        </div>
        <div class="input-group">
          <div class="input-label">🪙 금 / KRX 금현물</div>
          <input class="input-field" id="inp-gold" type="number" placeholder="0" min="0">
        </div>
        <div class="input-group">
          <div class="input-label">📄 채권 ETF (연금저축)</div>
          <input class="input-field" id="inp-bond" type="number" placeholder="0" min="0">
        </div>
        <div class="input-group">
          <div class="input-label">🏦 ISA (배당 ETF)</div>
          <input class="input-field" id="inp-isa" type="number" placeholder="0" min="0">
        </div>
        <div class="input-group">
          <div class="input-label">🇺🇸 미국 주식</div>
          <input class="input-field" id="inp-us" type="number" placeholder="0" min="0">
        </div>
        <div class="input-group">
          <div class="input-label">🇰🇷 국내 주식</div>
          <input class="input-field" id="inp-kr" type="number" placeholder="0" min="0">
        </div>
        <div class="input-group" style="grid-column:1/-1">
          <div class="input-label">🏖️ 연금저축펀드 (혼합)</div>
          <input class="input-field" id="inp-pension" type="number" placeholder="0" min="0">
        </div>
      </div>
      <button class="save-btn" id="saveBtn" onclick="saveMonth()">저장하기 (로컬 + Sheets)</button>
    </div>

    <div class="input-card">
      <div class="input-card-title">목표 자산 설정</div>
      <div class="input-group">
        <div class="input-label">목표 금액 (원)</div>
        <input class="input-field" id="inp-goal" type="number" placeholder="예: 100000000" min="0">
      </div>
      <button class="save-btn" style="margin-top:12px;background:var(--text2);" onclick="saveGoal()">목표 저장</button>
    </div>

    <!-- Google Sheets 바로가기 -->
    <a class="sheets-link" id="sheetsLink" href="#" target="_blank">
      <span>📊</span>
      <span>Google Sheets에서 상세 보기</span>
      <span style="margin-left:auto;color:var(--text3)">→</span>
    </a>
  </div>

</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('home',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    홈
  </button>
  <button class="tab-btn" onclick="switchTab('input',this)">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    입력
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>

// =====================================================
// ⚙️ 여기에 GAS 웹앱 URL을 붙여넣으세요
// =====================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyuZOD4OGpCwbpdyuLYtO480QEz-6kSFPbzDycBkjFDKLpW7HuIDCMqJUdwGvCjCgE/exec';
// =====================================================

const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const ASSETS = [
  { key:'cash',    name:'파킹통장',     account:'비상금',         icon:'💰', color:'#8A56E2', bg:'#F3EFFE', target:10 },
  { key:'gold',    name:'금 현물',      account:'KRX 금현물',     icon:'🪙', color:'#F7A600', bg:'#FFF9E6', target:10 },
  { key:'bond',    name:'채권 ETF',     account:'연금저축펀드',    icon:'📄', color:'#00B493', bg:'#E6F9F5', target:20 },
  { key:'isa',     name:'ISA 배당',     account:'ISA 배당주·ETF', icon:'🏦', color:'#3182F6', bg:'#EBF3FE', target:15 },
  { key:'us',      name:'미국 주식',    account:'일반 주식계좌',  icon:'🇺🇸', color:'#F04452', bg:'#FFF0F1', target:25 },
  { key:'kr',      name:'국내 주식',    account:'일반 주식계좌',  icon:'🇰🇷', color:'#00B0F0', bg:'#E6F6FF', target:10 },
  { key:'pension', name:'연금저축펀드', account:'혼합형 TDF',     icon:'🏖️', color:'#FF6B35', bg:'#FFF0EB', target:10 },
];

let data = JSON.parse(localStorage.getItem('portfolioData') || '{}');
let goal = parseInt(localStorage.getItem('portfolioGoal') || '0');
let selectedMonth = new Date().getMonth();
let donutChart = null, trendChart = null;

function fmt(n) {
  if (Math.abs(n) >= 100000000) return (n/100000000).toFixed(1) + '억';
  if (Math.abs(n) >= 10000) return Math.round(n/10000) + '만';
  return n.toLocaleString();
}
function fmtFull(n) { return '₩' + Math.round(n).toLocaleString(); }
function getMonthData(m) { return data[m] || { cash:0,gold:0,bond:0,isa:0,us:0,kr:0,pension:0 }; }
function getTotal(m) { const d = getMonthData(m); return ASSETS.reduce((s,a) => s+(d[a.key]||0), 0); }

function renderMonthTabs() {
  document.getElementById('monthTabs').innerHTML = MONTHS.map((m,i) =>
    `<button class="month-tab ${i===selectedMonth?'active':''}" onclick="selectMonth(${i})">${m}</button>`
  ).join('');
}

function selectMonth(m) {
  selectedMonth = m;
  renderMonthTabs();
  renderHome();
  loadInputFields();
}

function renderHome() {
  const cur   = getMonthData(selectedMonth);
  const total = getTotal(selectedMonth);
  const prev  = selectedMonth > 0 ? getTotal(selectedMonth-1) : 0;
  const diff  = total - prev;
  const diffPct = prev > 0 ? (diff/prev*100) : 0;

  document.getElementById('totalAmount').textContent = fmtFull(total);

  const badge = document.getElementById('changeBadge');
  if (prev === 0) {
    badge.textContent = '-'; badge.className = 'change-badge';
    document.getElementById('changeText').textContent = '전월 데이터 없음';
  } else {
    badge.textContent = (diff>=0?'+':'') + fmt(diff) + ' (' + (diff>=0?'+':'') + diffPct.toFixed(1) + '%)';
    badge.className = 'change-badge ' + (diff>=0?'positive':'negative');
    document.getElementById('changeText').textContent = '전월 대비';
  }

  const goalPct = goal > 0 ? Math.min(100, total/goal*100) : 0;
  document.getElementById('goalPct').textContent = goalPct.toFixed(1) + '%';
  document.getElementById('goalBar').style.width = goalPct + '%';

  document.getElementById('monthProfit').textContent = (diff>=0?'+':'') + fmtFull(diff);
  const mp = document.getElementById('monthProfitPct');
  mp.textContent = prev > 0 ? ((diff>=0?'+':'') + diffPct.toFixed(1) + '%') : '-';
  mp.className = 'stat-card-sub ' + (diff>0?'up':diff<0?'down':'neutral');

  const keys = Object.keys(data).map(Number).sort();
  const firstTotal = keys.length > 0 ? getTotal(keys[0]) : 0;
  const totalDiff = total - firstTotal;
  document.getElementById('totalProfit').textContent = (totalDiff>=0?'+':'') + fmtFull(totalDiff);
  const tp = document.getElementById('totalProfitPct');
  tp.textContent = firstTotal > 0 ? ((totalDiff>=0?'+':'') + (totalDiff/firstTotal*100).toFixed(1) + '%') : '-';
  tp.className = 'stat-card-sub ' + (totalDiff>0?'up':totalDiff<0?'down':'neutral');

  document.getElementById('donutCenter').textContent = total >= 100000000 ? (total/100000000).toFixed(1)+'억' : fmt(total)+'원';

  renderAssetList(cur, total);
  renderDonut(cur, total);
  renderTrend();
  renderRebalance(cur, total);
}

function renderAssetList(cur, total) {
  document.getElementById('assetList').innerHTML = ASSETS.map(a => {
    const val = cur[a.key]||0;
    const pct = total > 0 ? val/total*100 : 0;
    const diff = pct - a.target;
    const badge = Math.abs(diff) > 5
      ? `<span class="badge ${diff>0?'badge-warning':'badge-danger'}">${diff>0?'▲초과':'▽부족'}</span>`
      : `<span class="badge badge-ok">유지</span>`;
    return `<div class="asset-item">
      <div class="asset-icon" style="background:${a.bg}">${a.icon}</div>
      <div class="asset-info">
        <div class="asset-name">${a.name} ${badge}</div>
        <div class="asset-account">${a.account} · 목표 ${a.target}%</div>
        <div class="asset-bar-wrap"><div class="asset-bar-fill" style="width:${Math.min(100,pct/a.target*100)}%;background:${a.color}"></div></div>
      </div>
      <div class="asset-right">
        <div class="asset-amount">${fmtFull(val)}</div>
        <div class="asset-pct">${pct.toFixed(1)}%</div>
      </div>
    </div>`;
  }).join('');
}

function renderDonut(cur, total) {
  if (donutChart) { donutChart.destroy(); donutChart = null; }
  const vals = ASSETS.map(a => cur[a.key]||0);
  donutChart = new Chart(document.getElementById('donutChart').getContext('2d'), {
    type: 'doughnut',
    data: { labels: ASSETS.map(a=>a.name), datasets: [{ data: vals, backgroundColor: ASSETS.map(a=>a.color), borderWidth: 2, borderColor: '#fff', hoverOffset: 4 }] },
    options: { responsive:true, maintainAspectRatio:true, cutout:'68%',
      plugins: { legend:{display:false}, tooltip:{ callbacks:{ label: c => ` ${c.label}: ${fmtFull(c.raw)} (${total>0?(c.raw/total*100).toFixed(1):0}%)` } } }
    }
  });
  document.getElementById('legendList').innerHTML = ASSETS.map((a,i) => {
    const pct = total > 0 ? (vals[i]/total*100).toFixed(1) : '0.0';
    return `<div class="legend-item"><div class="legend-dot" style="background:${a.color}"></div><span class="legend-name">${a.name}</span><span class="legend-pct">${pct}%</span></div>`;
  }).join('');
}

function renderTrend() {
  const labels=[], totals=[];
  for (let i=0; i<12; i++) {
    if (data[i]!==undefined || i<=selectedMonth) { labels.push(MONTHS[i]); totals.push(getTotal(i)); }
  }
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  trendChart = new Chart(document.getElementById('trendChart').getContext('2d'), {
    type:'line',
    data:{ labels, datasets:[{ label:'총 자산', data:totals, borderColor:'#3182F6', backgroundColor:'rgba(49,130,246,0.08)', borderWidth:2, pointBackgroundColor:'#3182F6', pointRadius:4, fill:true, tension:0.4 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid:{display:false},ticks:{font:{size:11},color:'#8B95A1'}},
               y:{grid:{color:'#F2F4F6'},ticks:{font:{size:11},color:'#8B95A1', callback:v=>v>=100000000?(v/100000000).toFixed(1)+'억':(v/10000)+'만'}} }
    }
  });
}

function renderRebalance(cur, total) {
  const list = document.getElementById('rebalanceList');
  if (total===0) { list.innerHTML='<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px;">자산을 입력하면 리밸런싱 안내를 드려요</div>'; return; }
  list.innerHTML = ASSETS.map(a => {
    const val=cur[a.key]||0, curPct=total>0?val/total*100:0, diff=curPct-a.target;
    const diffAmt = Math.round((diff/100)*total);
    let cls, txt;
    if (diff>3){cls='rebalance-sell';txt='매도';}
    else if(diff<-3){cls='rebalance-buy';txt='매수';}
    else{cls='rebalance-hold';txt='유지';}
    return `<div class="rebalance-row">
      <div>
        <div class="rebalance-asset">${a.icon} ${a.name}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px;">현재 ${curPct.toFixed(1)}% → 목표 ${a.target}%</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <span class="rebalance-action ${cls}">${txt}</span>
        ${Math.abs(diff)>3?`<span style="font-size:11px;color:var(--text3)">${Math.abs(diff).toFixed(1)}% · ${(diffAmt>0?'-':'+')+fmtFull(Math.abs(diffAmt))}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function loadInputFields() {
  const d = getMonthData(selectedMonth);
  ASSETS.forEach(a => { const el=document.getElementById('inp-'+a.key); if(el) el.value=d[a.key]||''; });
  document.getElementById('inputMonthTitle').textContent = (selectedMonth+1) + '월 자산 입력';
  if (goal>0) document.getElementById('inp-goal').value = goal;
}

// =====================================================
// 💾 저장 - 로컬 + Google Sheets 동시 저장
// =====================================================
function saveMonth() {
  const d = {};
  ASSETS.forEach(a => { d[a.key] = parseInt(document.getElementById('inp-'+a.key).value||'0'); });

  // 1. 로컬 저장 (즉시)
  data[selectedMonth] = d;
  localStorage.setItem('portfolioData', JSON.stringify(data));
  renderHome();

  // 2. Google Sheets 전송
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  showBanner('loading', '🔄 Google Sheets에 저장 중...');

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',            // CORS 우회 (GAS 특성)
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ month: selectedMonth, ...d, goal })
  })
  .then(() => {
    showToast('✅ 저장 완료! (로컬 + Sheets)');
    showBanner('success', '✅ Google Sheets에 저장되었습니다');
  })
  .catch(() => {
    showToast('⚠️ 로컬 저장됨 (Sheets 연결 실패)');
    showBanner('error', '⚠️ Sheets 연결 실패 — 로컬에만 저장되었습니다');
  })
  .finally(() => {
    btn.disabled = false;
    btn.textContent = '저장하기 (로컬 + Sheets)';
  });
}

function saveGoal() {
  goal = parseInt(document.getElementById('inp-goal').value||'0');
  localStorage.setItem('portfolioGoal', goal.toString());
  showToast('목표가 설정되었어요 ✓');
  renderHome();
}

function showBanner(type, msg) {
  const b = document.getElementById('syncBanner');
  b.textContent = msg;
  b.className = 'sync-banner ' + (type==='success'?'':type==='error'?'error':'loading');
  b.style.display = 'flex';
  if (type==='success') setTimeout(() => { b.style.display='none'; }, 3000);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function switchTab(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  btn.classList.add('active');
  if (page==='input') loadInputFields();
}

function init() {
  const now = new Date();
  document.getElementById('currentDate').textContent =
    now.getFullYear() + '.' + String(now.getMonth()+1).padStart(2,'0') + '.' + String(now.getDate()).padStart(2,'0');
  selectedMonth = now.getMonth();
  renderMonthTabs();
  renderHome();
}

init();
</script>
</body>
</html>
